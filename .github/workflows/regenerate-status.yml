name: Regenerate Status

on:
  workflow_dispatch:
  repository_dispatch:
    types: [regenerate_status]

jobs:
  regenerate:
    name: Regenerate status artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}

      - name: Update response time
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}

      - name: Update summary in README
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}

      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}

      - name: Apply false-positive correction
        run: node scripts/correct-cyscale-api-uptime.js

      - name: Commit correction
        run: |
          if git diff --quiet; then
            echo "No correction needed"
            exit 0
          fi

          git config user.name "cyscale-bot"
          git config user.email "developers@cyscale.com"
          git add README.md history/summary.json api/cyscale-api/uptime*.json
          git commit -m ":card_file_box: Correct Cyscale API false-positive uptime [skip ci]"
          git push

      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}

      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.CYSCALE_BOT_PAT || secrets.GH_PAT || github.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "cyscale-bot"
          user_email: "developers@cyscale.com"
